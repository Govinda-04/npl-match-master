<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NPL Match Master{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" crossorigin="anonymous"></script>
  {% block head %}{% endblock %}
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <a href="/" class="nav-brand">
    <span class="nav-logo">🏏</span>
    <span>NPL Match Master</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link {% if active == 'home' %}active{% endif %}">Home</a>
    <a href="/predict" class="nav-link {% if active == 'predict' %}active{% endif %}">Predict</a>
    <a href="/about" class="nav-link {% if active == 'about' %}active{% endif %}">About</a>
  </div>
  <button type="button" class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
</nav>

<!-- ── Page Content ───────────────────────────────────────────────────────── -->
{% block content %}{% endblock %}

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="nav-logo">🏏</span>
      <span>NPL Match Master</span>
    </div>
    <p class="footer-tagline">AI-powered predictions for Nepal Premier League cricket</p>
    <p class="footer-copy">&copy; 2025 NPL Match Master — Built with Machine Learning</p>
  </div>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
